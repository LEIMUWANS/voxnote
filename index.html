<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f2ea" />
    <title>VoxNote | 语音转文字</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="balanced" data-density="compact" data-theme="light">
    <div class="app-shell">
      <aside class="control-panel" aria-label="语音转文字控制台">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>VoxNote</h1>
            <p>语音转文字工作台</p>
          </div>
          <button id="openSettingsButton" class="icon-action brand-settings" type="button" title="设置" aria-label="设置">
            <span class="button-icon settings-icon" aria-hidden="true"></span>
          </button>
        </div>

        <section class="mode-section" aria-label="工作台显示设置">
          <div class="segmented-control" role="group" aria-label="视图模式">
            <button type="button" class="segment-option is-active" data-view-mode="balanced">
              均衡
            </button>
            <button type="button" class="segment-option" data-view-mode="focus">专注</button>
            <button type="button" class="segment-option" data-view-mode="review">复核</button>
          </div>
        </section>

        <section class="status-strip" aria-live="polite">
          <div>
            <span class="label">状态</span>
            <strong id="statusText">待机</strong>
          </div>
          <span id="statusDot" class="status-dot"></span>
        </section>

        <section class="voice-monitor" aria-label="录音音量">
          <div class="monitor-header">
            <span>输入</span>
            <strong id="levelText">0%</strong>
          </div>
          <div class="level-bars" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="controls-section">
          <label class="field">
            <span>识别语言</span>
            <select id="languageSelect">
              <option value="zh-CN">普通话</option>
              <option value="zh-HK">粤语</option>
              <option value="en-GB">English UK</option>
              <option value="en-US">English US</option>
              <option value="ja-JP">日本语</option>
              <option value="ko-KR">한국어</option>
            </select>
          </label>

          <div class="permission-card" aria-live="polite">
            <div>
              <span>麦克风权限</span>
              <strong id="micPermissionText">检测中</strong>
            </div>
            <button id="micCheckButton" type="button">
              <span class="button-icon mic-icon" aria-hidden="true"></span>
              <span>检查</span>
            </button>
          </div>

          <label class="switch-row">
            <input id="continuousToggle" type="checkbox" checked />
            <span>连续识别</span>
          </label>

          <label class="switch-row">
            <input id="interimToggle" type="checkbox" checked />
            <span>显示临时结果</span>
          </label>
        </section>

        <section class="engine-section" aria-label="转录引擎">
          <div class="section-title">
            <span>转录引擎</span>
            <strong id="engineStatusText">检测中</strong>
          </div>
          <div class="segmented-control two" role="group" aria-label="转录方式">
            <button type="button" class="segment-option is-active" data-engine-type="local">
              本地免费
            </button>
            <button type="button" class="segment-option" data-engine-type="cloud">云端 API</button>
          </div>
          <label class="field">
            <span>云端转录模型</span>
            <select id="engineModel">
              <option value="gpt-4o-mini-transcribe">快速高性价比</option>
              <option value="gpt-4o-transcribe">更高准确率</option>
              <option value="gpt-4o-transcribe-diarize">说话人分离</option>
              <option value="whisper-1">Whisper 字幕模式</option>
            </select>
          </label>
          <label class="field">
            <span>本地模型</span>
            <select id="localModel">
              <option value="tiny">tiny 最快</option>
              <option value="base" selected>base 平衡</option>
              <option value="small">small 更准</option>
              <option value="medium">medium 高准确率</option>
              <option value="large-v3">large-v3 最高准确率</option>
            </select>
          </label>
          <div class="progress-row" aria-live="polite">
            <div>
              <span>处理</span>
              <strong id="jobStatusText">空闲</strong>
            </div>
            <div id="jobProgress" class="job-progress" aria-hidden="true">
              <span></span>
            </div>
          </div>
          <p id="jobDetailText" class="job-detail" aria-live="polite">
            本地引擎未安装时，文件只能先预览，不能转录。
          </p>
        </section>

        <section class="file-section" aria-label="本地音视频转录">
          <div class="section-title">
            <span>本地音视频</span>
            <strong id="fileStatusText">未选择</strong>
          </div>
          <label id="fileDrop" class="file-drop">
            <input id="mediaFileInput" type="file" accept="audio/*,video/*,.mp3,.mp4,.mpeg,.mpga,.m4a,.wav,.webm,.ogg,.flac" />
            <span class="button-icon upload-icon" aria-hidden="true"></span>
            <span>选择或拖入文件</span>
          </label>
          <div id="filePreview" class="media-preview" hidden>
            <video id="mediaPreview" controls playsinline></video>
            <p id="fileMetaText"></p>
          </div>
          <button id="transcribeFileButton" type="button" disabled>
            <span class="button-icon text-icon" aria-hidden="true"></span>
            <span>转录文件</span>
          </button>
        </section>

        <section class="system-section" aria-label="系统声音转录">
          <div class="section-title">
            <span>系统声音</span>
            <strong id="systemStatusText">未捕获</strong>
          </div>
          <div class="system-actions">
            <button id="startSystemButton" type="button">
              <span class="button-icon panel-icon" aria-hidden="true"></span>
              <span>捕获</span>
            </button>
            <button id="stopSystemButton" type="button" disabled>
              <span class="button-icon stop-icon" aria-hidden="true"></span>
              <span>停止</span>
            </button>
          </div>
          <div id="systemPreview" class="audio-section compact-audio" hidden>
            <audio id="systemPlayback" controls></audio>
            <button id="transcribeSystemButton" type="button" disabled>
              <span class="button-icon text-icon" aria-hidden="true"></span>
              <span>转录捕获声音</span>
            </button>
          </div>
        </section>

        <section class="transport" aria-label="录音控制">
          <button id="startButton" class="primary-action" type="button">
            <span class="button-icon record-icon" aria-hidden="true"></span>
            <span>开始</span>
          </button>
          <button id="stopButton" type="button" disabled>
            <span class="button-icon stop-icon" aria-hidden="true"></span>
            <span>停止</span>
          </button>
          <button id="clearButton" type="button">
            <span class="button-icon clear-icon" aria-hidden="true"></span>
            <span>清空</span>
          </button>
        </section>

        <section class="metrics" aria-label="转写统计">
          <div>
            <span>时长</span>
            <strong id="timerText">00:00</strong>
          </div>
          <div>
            <span>字数</span>
            <strong id="wordCount">0</strong>
          </div>
          <div>
            <span>分段</span>
            <strong id="segmentCount">0</strong>
          </div>
        </section>

        <section class="export-actions" aria-label="导出">
          <button id="copyButton" type="button">
            <span class="button-icon copy-icon" aria-hidden="true"></span>
            <span>复制</span>
          </button>
          <button id="downloadTxtButton" type="button">
            <span class="button-icon text-icon" aria-hidden="true"></span>
            <span>TXT</span>
          </button>
          <button id="downloadSrtButton" type="button">
            <span class="button-icon caption-icon" aria-hidden="true"></span>
            <span>SRT</span>
          </button>
        </section>

        <section class="editor-settings" aria-label="编辑器设置">
          <label class="range-field">
            <span>字号</span>
            <input id="fontSizeRange" type="range" min="14" max="22" value="16" />
            <strong id="fontSizeValue">16</strong>
          </label>
          <button id="themeButton" type="button">
            <span class="button-icon theme-icon" aria-hidden="true"></span>
            <span>深色</span>
          </button>
        </section>

        <section id="audioSection" class="audio-section" hidden>
          <span>录音文件</span>
          <audio id="audioPlayback" controls></audio>
          <button id="downloadAudioButton" type="button">
            <span class="button-icon audio-icon" aria-hidden="true"></span>
            <span>下载录音</span>
          </button>
        </section>
      </aside>

      <main class="workspace">
        <section class="transcript-surface" aria-label="转写文本">
          <div class="surface-header">
            <div>
              <span class="eyebrow">Transcript</span>
              <h2>转写稿</h2>
            </div>
            <div class="header-actions" aria-label="转写稿操作">
              <button id="formatButton" class="icon-action" type="button" title="整理文本" aria-label="整理文本">
                <span class="button-icon format-icon" aria-hidden="true"></span>
              </button>
              <button
                id="timestampButton"
                class="icon-action"
                type="button"
                title="插入时间"
                aria-label="插入时间"
              >
                <span class="button-icon clock-icon" aria-hidden="true"></span>
              </button>
              <button id="restoreButton" class="ghost-button" type="button">恢复草稿</button>
            </div>
          </div>
          <textarea
            id="transcriptArea"
            spellcheck="true"
            placeholder="转写内容会出现在这里，也可以直接编辑。"
          ></textarea>
          <div id="interimText" class="interim-text" aria-live="polite"></div>
        </section>

        <section class="segments-panel" aria-label="分段记录">
          <div class="surface-header compact">
            <div>
              <span class="eyebrow">Segments</span>
              <h2>分段</h2>
            </div>
            <button
              id="toggleSegmentsButton"
              class="icon-action"
              type="button"
              title="显示或隐藏分段"
              aria-label="显示或隐藏分段"
            >
              <span class="button-icon panel-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="segment-tools">
            <label class="search-field">
              <span class="button-icon search-icon" aria-hidden="true"></span>
              <input id="segmentSearch" type="search" placeholder="筛选分段" />
            </label>
            <span id="segmentMatchText" class="match-text">0 / 0</span>
          </div>
          <ol id="segmentsList" class="segments-list"></ol>
        </section>
      </main>
    </div>

    <div id="settingsModal" class="modal-backdrop" hidden>
      <section
        class="settings-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settingsTitle"
      >
        <div class="modal-header">
          <div>
            <span class="eyebrow">Settings</span>
            <h2 id="settingsTitle">设置</h2>
          </div>
          <button id="closeSettingsButton" class="icon-action" type="button" aria-label="关闭设置">
            <span class="button-icon delete-icon" aria-hidden="true"></span>
          </button>
        </div>

        <div class="settings-grid">
          <section class="settings-card">
            <div class="section-title">
              <span>默认转录方式</span>
              <strong id="settingsEngineText">本地免费</strong>
            </div>
            <div class="segmented-control two" role="group" aria-label="设置默认转录方式">
              <button type="button" class="segment-option is-active" data-settings-engine="local">
                本地免费
              </button>
              <button type="button" class="segment-option" data-settings-engine="cloud">
                云端 API
              </button>
            </div>
            <label class="field">
              <span>本地模型</span>
              <select id="settingsLocalModel">
                <option value="tiny">tiny 最快</option>
                <option value="base">base 平衡</option>
                <option value="small">small 更准</option>
                <option value="medium">medium 高准确率</option>
                <option value="large-v3">large-v3 最高准确率</option>
              </select>
            </label>
            <button id="refreshEngineButton" type="button">
              <span class="button-icon refresh-icon" aria-hidden="true"></span>
              <span>刷新引擎状态</span>
            </button>
          </section>

          <section class="settings-card">
            <div class="section-title">
              <span>云端 API</span>
              <strong id="apiKeyStatusText">未保存</strong>
            </div>
            <label class="field">
              <span>OpenAI API key</span>
              <input
                id="apiKeyInput"
                class="text-input"
                type="password"
                autocomplete="off"
                placeholder="sk-..."
              />
            </label>
            <label class="field">
              <span>云端模型</span>
              <select id="settingsEngineModel">
                <option value="gpt-4o-mini-transcribe">快速高性价比</option>
                <option value="gpt-4o-transcribe">更高准确率</option>
                <option value="gpt-4o-transcribe-diarize">说话人分离</option>
                <option value="whisper-1">Whisper 字幕模式</option>
              </select>
            </label>
            <div class="settings-actions">
              <button id="saveApiKeyButton" type="button">
                <span class="button-icon copy-icon" aria-hidden="true"></span>
                <span>保存</span>
              </button>
              <button id="clearApiKeyButton" type="button">
                <span class="button-icon clear-icon" aria-hidden="true"></span>
                <span>清除</span>
              </button>
            </div>
            <p class="settings-note">
              API key 只保存在这台设备。桌面正式版会改用系统钥匙串/凭据管理器。
            </p>
          </section>

          <section class="settings-card">
            <div class="section-title">
              <span>界面</span>
              <strong>本机设置</strong>
            </div>
            <label class="range-field">
              <span>字号</span>
              <input id="settingsFontSizeRange" type="range" min="14" max="22" value="16" />
              <strong id="settingsFontSizeValue">16</strong>
            </label>
            <button id="settingsThemeButton" type="button">
              <span class="button-icon theme-icon" aria-hidden="true"></span>
              <span>深色</span>
            </button>
          </section>
        </div>
      </section>
    </div>

    <template id="segmentTemplate">
      <li>
        <div class="segment-meta">
          <time></time>
          <span></span>
        </div>
        <p></p>
        <div class="segment-actions">
          <button type="button" data-segment-action="focus" title="定位文本" aria-label="定位文本">
            <span class="button-icon locate-icon" aria-hidden="true"></span>
          </button>
          <button type="button" data-segment-action="copy" title="复制分段" aria-label="复制分段">
            <span class="button-icon copy-icon" aria-hidden="true"></span>
          </button>
          <button type="button" data-segment-action="delete" title="删除分段" aria-label="删除分段">
            <span class="button-icon delete-icon" aria-hidden="true"></span>
          </button>
        </div>
      </li>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
